appId: com.grooveai.app
---
# Remaining Presets Test — 8 presets (Ophelia through Cotton Eye Joe)
# Layout:
#   Trending row (horizontal): Big Guy, Coco Channel, Trag, Ophelia, Jenny
#   Classic row (below fold): Macarena, Milkshake, C Walk
#   Face Dance row (below fold): Boombastic, Witch Doctor, Cotton Eye Joe
#
# Ophelia/Jenny need LEFT swipe on Trending carousel (de-virtualizes off-screen cells)
# Classic/Face Dance need vertical scroll (scrollUntilVisible works for those)
# Does NOT tap Generate — Kling rate limit (~1 per 43min in dev)

# ════════════════════════════════════════════
# PRESET 4: OPHELIA (Trending, 4th — 1 swipe left)
# ════════════════════════════════════════════
- launchApp
- assertVisible:
    text: "Groove AI"
- swipe:
    start: "80%,55%"
    end: "20%,55%"
    duration: 300
- tapOn:
    text: "Ophelia"
- assertVisible:
    text: "Use This Dance"
- tapOn:
    text: "Use This Dance"
- assertVisible:
    text: "Select a Photo First"
- tapOn:
    id: "camera.fill"
- waitForAnimationToEnd
- tapOn:
    point: "17%,25%"
- waitForAnimationToEnd
- assertVisible:
    text: "Generate"

# ✅ OPHELIA FLOW: PASS

